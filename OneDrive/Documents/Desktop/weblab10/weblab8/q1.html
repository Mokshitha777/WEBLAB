<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; border-left: 5px solid #007bff; }
        h2 { color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        p { font-size: 1.1em; color: #555; }
        .highlight { font-weight: bold; color: #007bff; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Student Report</h2>
        <div id="output"></div>
    </div>

    <script>
        let studentName = "Arun";
        let mark1 = 85, mark2 = 90, mark3 = 88;

        const calculateAverage = (m1, m2, m3) => (m1 + m2 + m3) / 3;
        let average = calculateAverage(mark1, mark2, mark3);

        document.getElementById("output").innerHTML = `
            <p>Student Name: <span class="highlight">${studentName}</span></p>
            <p>Total Marks: <span class="highlight">${mark1 + mark2 + mark3}</span></p>
            <p>Average Marks: <span class="highlight">${average.toFixed(2)}</span></p>
        `;
    </script>
</body>
</html>
